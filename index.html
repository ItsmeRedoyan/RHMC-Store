<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RHMC SMP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; color: #fff; background: #000; margin: 0; }
    section { padding: 80px 20px; text-align: center; }
    h1, h2, h3 { font-weight: 700; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 30px; margin: 20px auto; max-width: 800px; }
    .btn { display: inline-block; padding: 15px 40px; border-radius: 30px;
           background: linear-gradient(90deg, #6a11cb, #2575fc); color: #fff; text-decoration: none; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>RHMC SMP</h1>
    <h2>Premium Cross-Platform Survival Experience</h2>
    <a href="https://discord.gg/2vQdSCPxqv" target="_blank" class="btn">Join Now</a>
  </section>

  <section id="status">
    <div class="card">
      <h2>Live Server Status</h2>
      <p>IP: <strong>157.15.98.164:2026</strong></p>
      <p id="server-status">Checking status...</p>
    </div>
  </section>

  <script>
    async function fetchServerStatus() {
      try {
        const response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://api.mcsrvstat.us/2/157.15.98.164:2026"));
        const data = await response.json();
        const parsed = JSON.parse(data.contents);
        document.getElementById("server-status").innerHTML =
          parsed.online ? `🟢 Online - Players: ${parsed.players.online}/${parsed.players.max}` : "🔴 Offline";
      } catch {
        document.getElementById("server-status").innerHTML = "Error fetching status.";
      }
    }
    fetchServerStatus();
  </script>
</body>
</html>
